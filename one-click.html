<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSIRT Banjarmasin - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; }
        p { color: #666; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            margin-top: 20px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 CSIRT Banjarmasin</h1>
        <p>Silakan login untuk melanjutkan</p>
        <a href="https://csirt.banjarmasinkota.go.id/core/i18n/ko/" 
           target="_blank" 
           class="btn"
           referrerpolicy="unsafe-url">
           Login Sekarang
        </a>
        <p style="margin-top:20px;font-size:12px;color:#999;">
            Klik link di atas untuk login ke CSIRT Banjarmasin
        </p>
    </div>
</body>
</html>
